<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivAgent | AI 文明 — Regime Browser</title>
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #d4af37;
      --accent-dim: rgba(212,175,55,0.15);
      --blue: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --purple: #bc8cff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #1b365d 0%, var(--bg) 100%);
    }
    .header h1 {
      font-size: 2.5rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .header h1 span { color: var(--text); font-weight: 300; }
    .header p {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .header .badge {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.85rem;
      margin-top: 1rem;
      border: 1px solid rgba(212,175,55,0.3);
    }
    .controls {
      max-width: 1200px;
      margin: 1.5rem auto;
      padding: 0 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-muted); }
    .filter-btn {
      padding: 0.5rem 1rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .stats {
      max-width: 1200px;
      margin: 0 auto 1rem;
      padding: 0 1rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .stat {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .stat strong { color: var(--accent); }
    .grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      transition: border-color 0.2s, transform 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }
    .card-title {
      font-size: 1.15rem;
      font-weight: 600;
    }
    .card-title .zh { color: var(--accent); }
    .card-title .en { color: var(--text); font-weight: 400; font-size: 0.95rem; }
    .card-era {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      white-space: nowrap;
    }
    .card-system {
      font-size: 0.85rem;
      color: var(--blue);
      margin-bottom: 0.5rem;
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .card-tags {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 0.7rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
    }
    .agent-count {
      font-size: 0.8rem;
      color: var(--green);
      font-weight: 500;
    }
    .pattern-badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-weight: 500;
    }
    .pattern-centralized-hierarchy { background: rgba(248,81,73,0.15); color: var(--red); }
    .pattern-checks-balances { background: rgba(88,166,255,0.15); color: var(--blue); }
    .pattern-dual-power { background: rgba(188,140,255,0.15); color: var(--purple); }
    .pattern-federated-autonomy { background: rgba(63,185,80,0.15); color: var(--green); }
    .pattern-democratic-council { background: rgba(212,175,55,0.15); color: var(--accent); }
    .pattern-theocratic { background: rgba(255,123,114,0.15); color: #ff7b72; }
    .region-badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
    }
    .region-china { background: rgba(248,81,73,0.12); color: #ff7b72; }
    .region-global { background: rgba(88,166,255,0.12); color: var(--blue); }
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    .lang-toggle {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.5rem 1rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.9rem;
      z-index: 100;
      transition: all 0.2s;
    }
    .lang-toggle:hover { border-color: var(--accent); }
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .footer a { color: var(--blue); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    @media (max-width: 600px) {
      .header h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; }
      .controls { flex-direction: column; }
    }
  </style>
</head>

<div class="header">

</div>

<script>
const REGIMES = [{"id": "five-dynasties", "name": {"zh": "五代十国", "en": "Five Dynasties and Ten Kingdoms"}, "era": {"zh": "907年-960年", "en": "907-960 AD"}, "region": "china", "system": {"zh": "分裂军阀制", "en": "Fragmented Warlord System"}, "description": {"zh": "唐末藩镇割据演变而来的乱世。中原五朝更迭（后梁、后唐、后晋、后汉、后周），南方十国并立。名义上有朝廷，实际各节度使拥兵自重、各自为政。武将称帝、政权频繁更替，是中国历史上最混乱的时期之一。", "en": "An era of fragmentation following the Tang collapse. Five successive dynasties ruled the Central Plains while ten kingdoms coexisted in the south. Nominally unified under a court, regional warlords (jiedushi) held real power. Military strongmen seized thrones frequently, making this one of China's most chaotic periods."}, "agentCount": 5, "tags": ["fragmented", "competitive", "warlord", "chaotic"], "pattern": "federated-autonomy", "path": "china/five-dynasties"}, {"id": "han", "name": {"zh": "汉朝", "en": "Han Dynasty"}, "era": {"zh": "公元前206年-公元220年", "en": "206 BC - 220 AD"}, "region": "china", "system": {"zh": "三公九卿制（完善）", "en": "Three Lords Nine Ministers System (refined)"}, "description": {"zh": "汉朝继承并完善了秦制，以三公（丞相、太尉、御史大夫）为核心，九卿分掌具体事务。外儒内法，以德治为表、法治为里，建立了延续四百余年的大一统帝国。独尊儒术，察举选才，形成了士大夫阶层主导的治理体系。", "en": "The Han Dynasty inherited and refined the Qin system, with Three Lords (Chancellor, Grand Commandant, Imperial Censor) at the core and Nine Ministers managing specific affairs. It practiced Confucianism outwardly and Legalism internally, building a unified empire lasting over 400 years. Confucian orthodoxy and the recommendation system created a scholar-official-led governance."}, "agentCount": 10, "tags": ["confucian", "centralized", "meritocratic"], "pattern": "centralized-hierarchy", "path": "china/han"}, {"id": "jin-jurchen", "name": {"zh": "金朝", "en": "Jin Dynasty (Jurchen)"}, "era": {"zh": "1115年-1234年", "en": "1115-1234 AD"}, "region": "china", "system": {"zh": "女真汉分治", "en": "Jurchen-Han Divided Governance"}, "description": {"zh": "金朝由女真族完颜阿骨打建立，灭辽后入主中原。军政上以猛安谋克制为核心，兵民合一；行政上逐步采用汉制尚书省六部。女真尚武精神与汉制文治并行，形成独特的双重治理模式。", "en": "Founded by Wanyan Aguda of the Jurchen people, the Jin Dynasty conquered the Liao and ruled northern China. Its military-political core was the Meng'an-Mouke system combining soldiers and civilians. Administration gradually adopted Chinese-style Six Ministries under the Department of State Affairs, blending Jurchen martial tradition with Chinese civil governance."}, "agentCount": 6, "tags": ["jurchen", "dual-ethnic", "military-merit"], "pattern": "dual-power", "path": "china/jin-jurchen"}, {"id": "jin", "name": {"zh": "晋朝", "en": "Jin Dynasty"}, "era": {"zh": "266年-420年", "en": "266-420 AD"}, "region": "china", "system": {"zh": "九品中正制", "en": "Nine-Rank System"}, "description": {"zh": "晋朝以九品中正制选拔官员，由中正官按家世、行状、才能品评人物，分为九等授官。实际运行中逐渐演变为「上品无寒门，下品无士族」的门阀政治。中央权力孱弱，地方都督、刺史各据一方，清谈玄学之风盛行。", "en": "The Jin Dynasty selected officials through the Nine-Rank System, where Arbiter officials assessed candidates based on family background, conduct, and talent across nine grades. In practice, this devolved into aristocratic gate-clan politics where elite families monopolized high offices. Central authority was weak while regional military governors held real power. Xuanxue (Neo-Daoist) philosophical discourse flourished."}, "agentCount": 6, "tags": ["aristocratic", "weak-center", "rank-based"], "pattern": "federated-autonomy", "path": "china/jin"}, {"id": "liao", "name": {"zh": "辽朝", "en": "Liao Dynasty"}, "era": {"zh": "907年-1125年", "en": "907-1125 AD"}, "region": "china", "system": {"zh": "双重行政制", "en": "Dual Administration System"}, "description": {"zh": "辽朝由契丹族耶律阿保机建立，首创南北面官双轨行政制度。北面官以契丹旧制治理游牧民族事务，南面官以汉制治理汉地农耕事务。因俗而治、灵活务实，是中国历史上民族融合治理的典范。", "en": "Founded by Yelü Abaoji of the Khitan people, the Liao Dynasty pioneered a dual administration system. Northern officials governed nomadic affairs using Khitan traditions, while Southern officials administered settled Han regions using Chinese bureaucratic methods. This pragmatic 'govern according to customs' approach became a model for multi-ethnic governance."}, "agentCount": 6, "tags": ["dual-system", "khitan", "nomadic-sedentary"], "pattern": "dual-power", "path": "china/liao"}, {"id": "ming", "name": {"zh": "明朝", "en": "Ming Dynasty"}, "era": {"zh": "1368年-1644年", "en": "1368-1644 AD"}, "region": "china", "system": {"zh": "内阁制+司礼监", "en": "Grand Secretariat + Directorate of Ceremonial"}, "description": {"zh": "明朝废除丞相制度，皇权空前强化。内阁负责票拟（起草建议），司礼监负责批红（代行批准），形成文臣与宦官的双轨决策体系。六部直接对皇帝负责，内阁与司礼监相互制约又相互依存，是中国历史上独特的双权力中心制度。", "en": "The Ming Dynasty abolished the chancellorship, concentrating imperial power. The Grand Secretariat drafted proposals (ticket-writing) while the Directorate of Ceremonial approved them (vermillion-marking), creating a dual civil-eunuch decision track. Six Ministries reported directly to the emperor, with Secretariat and Directorate balancing each other—a unique dual-power center in Chinese history."}, "agentCount": 8, "tags": ["dual-power", "eunuch-politics", "autocratic"], "pattern": "dual-power", "path": "china/ming"}, {"id": "north-south", "name": {"zh": "南北朝", "en": "Northern and Southern Dynasties"}, "era": {"zh": "420年-589年", "en": "420-589 AD"}, "region": "china", "system": {"zh": "门阀士族制", "en": "Aristocratic Clan System"}, "description": {"zh": "南北朝是中国历史上南北对峙的分裂时期。南朝（宋齐梁陈）偏安江南，重文轻武，门阀士族把控政治；北朝（北魏、东西魏、北齐北周）由鲜卑等少数民族建立，尚武崇实。南北文化碰撞融合，佛教在此时期空前兴盛，「南朝四百八十寺」成为时代标志。", "en": "The Northern and Southern Dynasties was a period of north-south division in Chinese history. The Southern Dynasties (Song, Qi, Liang, Chen) held the Jiangnan region, favoring literary culture with aristocratic clans dominating politics. The Northern Dynasties (Northern Wei, Eastern/Western Wei, Northern Qi/Zhou), established by Xianbei and other non-Han peoples, valued martial prowess. Cultural fusion between north and south occurred alongside unprecedented Buddhist flourishing."}, "agentCount": 6, "tags": ["divided", "aristocratic", "clan-politics"], "pattern": "federated-autonomy", "path": "china/north-south"}, {"id": "qin", "name": {"zh": "秦朝", "en": "Qin Dynasty"}, "era": {"zh": "公元前221年-公元前206年", "en": "221-206 BC"}, "region": "china", "system": {"zh": "郡县制·三公九卿", "en": "Commandery-County System with Three Lords Nine Ministers"}, "description": {"zh": "秦始皇统一六国后建立了中国第一个中央集权制国家。废分封、行郡县，以三公（丞相、太尉、御史大夫）为核心行政架构，九卿分管具体事务。法家思想治国，令行禁止，赏罚分明。", "en": "After unifying the six states, Qin Shi Huang established China's first centralized imperial state. Abolished feudalism for commandery-county system, with Three Lords (Chancellor, Grand Commandant, Imperial Censor) as core administration and Nine Ministers managing specific affairs. Governed by Legalist principles with strict enforcement."}, "agentCount": 7, "tags": ["centralized", "legalist", "strict-hierarchy", "first-empire"], "pattern": "centralized-hierarchy", "path": "china/qin"}, {"id": "qing", "name": {"zh": "清朝", "en": "Qing Dynasty"}, "era": {"zh": "1644年-1912年", "en": "1644-1912 AD"}, "region": "china", "system": {"zh": "军机处+满汉合作", "en": "Grand Council + Manchu-Han Cooperation"}, "description": {"zh": "清朝以军机处为核心决策机构，军机大臣由皇帝亲选，直接承旨办事，决策迅速高效。实行满汉合作，六部设满汉双尚书，以满人为主导、汉人为辅助。总督巡抚制管理地方，都察院负责监察，形成了中央集权与地方治理并重的体系。", "en": "The Qing Dynasty centered on the Grand Council as its core decision-making body, with councilors personally selected by the emperor for rapid, efficient governance. It practiced Manchu-Han cooperation with dual ministers in Six Ministries. Governors-General managed provinces while the Censorate provided oversight, balancing centralized power with provincial administration."}, "agentCount": 8, "tags": ["elite-council", "rapid-decision", "manchu-han"], "pattern": "centralized-hierarchy", "path": "china/qing"}, {"id": "roc", "name": {"zh": "中华民国", "en": "Republic of China"}, "era": {"zh": "1912年-1949年", "en": "1912-1949 AD"}, "region": "china", "system": {"zh": "五权分立", "en": "Five-Power Constitution"}, "description": {"zh": "亚洲第一个民主共和国。孙中山先生在西方三权分立基础上，融合中国传统的考试和监察制度，创立五权宪法：行政、立法、司法、考试、监察五院分权制衡。国民大会代表全体国民行使政权。三民主义（民族、民权、民生）为建国纲领。", "en": "Asia's first democratic republic. Dr. Sun Yat-sen augmented Western separation of powers with traditional Chinese examination and censorate systems, creating the Five-Power Constitution: Executive, Legislative, Judicial, Examination, and Control Yuans. The National Assembly represented the people's sovereignty. The Three Principles of the People guided nation-building."}, "agentCount": 7, "tags": ["republican", "five-powers", "modern", "democratic"], "pattern": "checks-and-balances", "path": "china/roc"}, {"id": "shang", "name": {"zh": "商朝", "en": "Shang Dynasty"}, "era": {"zh": "约公元前1600年-前1046年", "en": "c. 1600-1046 BC"}, "region": "china", "system": {"zh": "神权贵族制", "en": "Theocratic Aristocracy"}, "description": {"zh": "商朝以神权政治为核心，王权与神权合一。商王既是政治领袖也是最高祭司，凡军国大事必先占卜问天。甲骨文记录了大量占卜内容，形成了独特的神权决策体系。贵族等级森严，以血缘和宗教地位划分权力。", "en": "The Shang Dynasty centered on theocratic governance, unifying royal and divine authority. The Shang King served as both political leader and supreme priest, consulting oracle bones before all major state decisions. Oracle bone inscriptions document this extensive divination system. A rigid aristocratic hierarchy distributed power based on bloodline and religious status."}, "agentCount": 6, "tags": ["theocratic", "divination", "oracle-bones"], "pattern": "theocratic", "path": "china/shang"}, {"id": "song", "name": {"zh": "宋朝", "en": "Song Dynasty"}, "era": {"zh": "960年-1279年", "en": "960-1279 AD"}, "region": "china", "system": {"zh": "二府三司制", "en": "Two Offices Three Commissions System"}, "description": {"zh": "宋朝实行二府三司制，中书门下掌行政，枢密院掌军事，三司掌财政，三权分立、互不统属。崇文抑武，以文驭武，建立了中国历史上文官治国最彻底的政治体系。理学兴盛，注重程序正义，决策讲求论证。", "en": "The Song Dynasty implemented the Two Offices Three Commissions system: Zhongshu-Menxia for administration, Privy Council for military, and Three Commissions for finance—three powers separated and independent. It established the most thorough civilian-supremacy system in Chinese history, with Neo-C rnment modeled Tang-Song institutions with Secretariat and Bureau of Military Affairs. Military-first policy with Buddhist advisory role. Created an independent Tangut script, emphasizing cultural autonomy. Survived nearly two centuries between Song, Liao, and Jin through exceptional diplomacy."}, "agentCount": 5, "tags": ["tangut", "multi-ethnic", "military-first", "buddhist"], "pattern": "centralized-hierarchy", "path": "china/western-xia"}, {"id": "xia", "name": {"zh": "夏朝", "en": "Xia Dynasty"}, "era": {"zh": "约公元前2070年-前1600年", "en": "c. 2070-1600 BC"}, "region": "china", "system": {"zh": "分封制/家族制", "en": "Enfeoffment-Clan System"}, "description": {"zh": "夏朝是中国历史上第一个世袭王朝，标志着从部落联盟到家天下的转变。大禹治水建立威望后传位于子启，开启了王位世袭制。政治体制以氏族血缘为纽带，重视水利工程与农牧生产。", "en": "The Xia Dynasty was China's first hereditary dynasty, marking the transition from tribal confederation to dynastic rule. After Yu the Great earned prestige through flood control, his son Qi inherited the throne, initiating hereditary succession. Governance was bound by clan blood ties, emphasizing hydraulic engineering and agro-pastoral production."}, "agentCount": 5, "tags": ["clan", "earliest", "patriarchal"], "pattern": "centralized-hierarchy", "path": "china/xia"}, {"id": "yuan", "name": {"zh": "元朝", "en": "Yuan Dynasty"}, "era": {"zh": "1271年-1368年", "en": "1271-1368 AD"}, "region": "china", "system": {"zh": "行省制", "en": "Provincial System"}, "description": {"zh": "蒙古人建立的大一统王朝，疆域横跨欧亚。忽必烈以中书省为中央决策机构，枢密院掌军事，御史台主监察，各行省分治地方。行省制度影响深远，奠定了中国此后的省级行政区划。多民族帝国的治理模式，融合草原与中原制度。", "en": "A Mongol-founded unified dynasty spanning Eurasia. Kublai Khan centralized power through the Zhongshu Secretariat, the Bureau of Military Affairs, and the Censorate. Provincial administrations governed vast territories. The provincial system profoundly shaped China's administrative geography. A multi-ethnic empire blending steppe and Chinese governance traditions."}, "agentCount": 7, "tags": ["mongol", "centralized", "provincial", "multi-ethnic"] 299-1922"}, "region": "global", "system": {"zh": "苏丹-迪万制", "en": "Sultan-Divan System"}, "description": {"zh": "奥斯曼帝国横跨六个世纪，统治三大洲，是伊斯兰世界最持久的帝国。苏丹作为安拉在世间之影统治一切，通过迪万（御前会议）和大维齐尔体系治理国家。独特的德夫希尔梅（少年征募）制度从基督教臣民中选拔精英，培养为忠于苏丹的行政官员和近卫军。米勒特制度允许各宗教社群自治。", "en": "The Ottoman Empire spanned six centuries across three continents, the most enduring empire in the Islamic world. The Sultan ruled as the Shadow of God on Earth through the Divan (Imperial Council) and Grand Vizier system. The unique devshirme (youth levy) recruited elites from Christian subjects, training them as loyal administrators and Janissaries. The millet system granted religious communities self-governance."}, "agentCount": 7, "tags": ["sultan", "divan", "devshirme", "millet"], "pattern": "centralized-hierarchy", "path": "global/ottoman"}, {"id": "persian", "name": {"zh": "波斯阿契美尼德帝国", "en": "Persian Achaemenid Empire"}, "era": {"zh": "公元前550年-公元前330年", "en": "550-330 BC"}, "region": "global", "system": {"zh": "总督制", "en": "Satrap System"}, "description": {"zh": "阿契美尼德帝国是人类历史上第一个真正的世界帝国，疆域从埃及延伸至印度河。万王之王（Shahanshah）通过总督（Satrap）制度管理庞大领土，允许各民族保留宗教和习俗。皇帝之眼（Royal Eye）秘密巡视各省确保忠诚。以宗教宽容、高效行政和多元文化治理闻名。", "en": "The Achaemenid Empire was history's first true world empire, stretching from Egypt to the Indus River. The Shahanshah (King of Kings) governed vast territories through the Satrap system, allowing subject peoples to retain their religions and customs. The Royal Eye secretly inspected provinces to ensure loyalty. Renowned for religious tolerance, administrative efficiency, and multicultural governance."}, "agentCount": 7, "tags": ["satrapy", "king-of-kings", "tolerant", "multi-ethnic"], "pattern": "federated-autonomy", "path": "global/persian"}, {"id": "polish", "name": {"zh": "波兰立陶宛联邦", "en": "Polish-Lithuanian Commonwealth"}, "era": {"zh": "1569-1795 选举君主制时期", "en": "1569-1795 Elective Monarchy Era"}, "region": "global", "system": {"zh": "选举君主制", "en": "Elective Monarchy"}, "description": {"zh": "欧洲最大的选举君主制国家，贵族（szl ments, creating a national identity that transcended kinship. Conquered peoples were assimilated rather than destroyed. This highly centralized military-administrative system defeated British regulars at Isandlwana in 1879, shocking Europe."}, "agentCount": 5, "tags": ["military", "centralized", "regimental", "expansion"], "pattern": "centralized-hierarchy", "path": "global/zulu"}];

const PATTERN_LABELS = {
  'centralized-hierarchy': 'Centralized Hierarchy',
  'checks-balances': 'Checks & Balances',
  'dual-power': 'Dual Power',
  'federated-autonomy': 'Federated Autonomy',
  'democratic-council': 'Democratic Council',
  'theocratic': 'Theocratic'
};

let lang = 'zh';
let regionFilter = 'all';
let searchQuery = '';

function t(obj) {
  if (!obj) return '';
  return obj[lang] || obj['zh'] || obj['en'] || '';
}

function patternClass(p) {
  return 'pattern-' + (p || '').replace(/[^a-z-]/g, '');
}

function renderCards() {
  const grid = document.getElementById('grid');
  let filtered = REGIMES.filter(r => {
    if (regionFilter !== 'all' && r.region !== regionFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const searchable = [
        t(r.name), r.name.zh, r.name.en,
        t(r.system), r.system.zh, r.system.en,
        t(r.era), t(r.description),
        r.pattern, ...(r.tags || []), r.path
      ].join(' ').toLowerCase();
      if (!searchable.includes(q)) return false;
    }
    return true;
  });

  // Sort: china first (by era roughly), then global
  filtered.sort((a, b) => {
    if (a.region !== b.region) return a.region === 'china' ? -1 : 1;
    return a.path.localeCompare(b.path);
  });

  // Stats
  const patterns = {};
  filtered.forEach(r => {
    const p = r.pattern || 'unknown';
    patterns[p] = (patterns[p] || 0) + 1;
  });
  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = '<span class="stat">Showing <strong>' + filtered.length + '</strong> / ' + REGIMES.length + ' regimes</span>' +
    Object.entries(patterns).map(([k,v]) =>
      '<span class="stat"><span class="pattern-badge ' + patternClass(k) + '">' + (PATTERN_LABELS[k]||k) + '</span> ' + v + '</span>'
    ).join('');

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No regimes match your search.</div>';
    return;
  }

  grid.innerHTML = filtered.map(r => {
    const repoBase = 'https://github.com/LeoLin990405/civagent/tree/main/regimes/';
    return '<a class="card" href="' + repoBase + r.path + '" target="_blank">' +
      '<div class="card-header">' +
        '<div class="card-title">' +
          '<span class="zh">' + (r.name.zh || '') + '</span> ' +
          '<span class="en">' + (r.name.en || '') + '</span>' +
        '</div>' +
        '<span class="card-era">' + t(r.era) + '</span>' +
      '</div>' +
      '<div class="card-system">' + t(r.system) + '</div>' +
      '<div class="card-desc">' + t(r.description) + '</div>' +
      '<div class="card-footer">' +
        '<div class="card-tags">' +
          '<span class="region-badge region-' + r.region + '">' + (r.region === 'china' ? '中华' : 'Global') + '</span>' +
          '<span class="pattern-badge ' + patternClass(r.pattern) + '">' + (PATTERN_LABELS[r.pattern] || r.pattern) + '</span>' +
          (r.tags || []).slice(0, 3).map(tag => '<span class="tag">' + tag + '</span>').join('') +
        '</div>' +
        '<span class="agent-count">' + r.agentCount + ' agents</span>' +
      '</div>' +
    '</a>';
  }).join('');
}

// Event listeners
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderCards();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    regionFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById('langToggle').addEventListener('click', () => {
  lang = lang === 'zh' ? 'en' : 'zh';
  renderCards();
});

// Initial render
renderCards();
</script>
