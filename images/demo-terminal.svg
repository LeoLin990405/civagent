<svg xmlns="http://www.w3.org/2000/svg" width="900" height="680" viewBox="0 0 900 680">
  <defs>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect width="900" height="680" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="900" height="36" rx="10" fill="url(#titlebar)"/>
  <rect y="26" width="900" height="10" fill="url(#titlebar)"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="450" y="23" text-anchor="middle" fill="#cdd6f4" font-family="monospace" font-size="13">CivAgent — Terminal Demo</text>

  <!-- Terminal content -->
  <g font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="12.5">

    <!-- Command 1: list -->
    <text x="20" y="60" fill="#a6e3a1">$</text>
    <text x="35" y="60" fill="#cdd6f4">./scripts/list-regimes.sh</text>

    <text x="20" y="82" fill="#89b4fa">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    <text x="20" y="98" fill="#89b4fa">  CivAgent — Regime Catalog</text>
    <text x="20" y="114" fill="#89b4fa">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

    <text x="20" y="136" fill="#a6e3a1">中华朝代 / Chinese Dynasties (20)</text>
    <text x="20" y="152" fill="#585b70">──────────────────────────────────────────────────────</text>
    <text x="20" y="168" fill="#cdd6f4">  秦朝 (Qin Dynasty)         221-206 BC    Three Lords Nine Ministers   7 agents</text>
    <text x="20" y="184" fill="#cdd6f4">  唐朝 (Tang Dynasty)         618-907 AD    Three Depts Six Ministries   7 agents</text>
    <text x="20" y="200" fill="#cdd6f4">  宋朝 (Song Dynasty)         960-1279 AD   Two Offices Three Commissions 8 agents</text>
    <text x="20" y="216" fill="#cdd6f4">  明朝 (Ming Dynasty)         1368-1644 AD  Grand Secretariat + Eunuchs  8 agents</text>
    <text x="20" y="232" fill="#585b70">  ... (20 dynasties total)</text>

    <text x="20" y="254" fill="#a6e3a1">世界帝国 / Global Empires (37)</text>
    <text x="20" y="270" fill="#585b70">──────────────────────────────────────────────────────</text>
    <text x="20" y="286" fill="#cdd6f4">  雅典民主 (Athenian Democracy) 508-322 BC   Direct Democracy             6 agents</text>
    <text x="20" y="302" fill="#cdd6f4">  罗马共和 (Roman Republic)    509-27 BC    Senate + Consuls             8 agents</text>
    <text x="20" y="318" fill="#cdd6f4">  苏联 (Soviet Union)         1922-1991    Politburo System             7 agents</text>
    <text x="20" y="334" fill="#585b70">  ... (37 empires total)</text>

    <text x="20" y="356" fill="#89b4fa">Total: 57/57 regimes configured</text>

    <!-- Command 2: validate -->
    <text x="20" y="386" fill="#a6e3a1">$</text>
    <text x="35" y="386" fill="#cdd6f4">./scripts/validate-regime.sh china/qin</text>

    <text x="20" y="406" fill="#cdd6f4">Validating regime: china/qin</text>
    <text x="20" y="422" fill="#a6e3a1">✓ metadata.json is valid JSON</text>
    <text x="20" y="438" fill="#a6e3a1">✓ openclaw.json.template is valid JSON</text>
    <text x="20" y="454" fill="#a6e3a1">✓ 7 agents defined</text>
    <text x="20" y="470" fill="#a6e3a1">✓ Regime 'china/qin' is valid!</text>

    <!-- Command 3: switch -->
    <text x="20" y="500" fill="#a6e3a1">$</text>
    <text x="35" y="500" fill="#cdd6f4">./scripts/switch-regime.sh china/qin</text>

    <text x="20" y="522" fill="#89b4fa">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    <text x="20" y="538" fill="#89b4fa">  CivAgent — Switching Regime</text>
    <text x="20" y="554" fill="#89b4fa">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    <text x="20" y="574" fill="#cdd6f4">  Regime:  </text><text x="105" y="574" fill="#a6e3a1">秦朝</text><text x="140" y="574" fill="#cdd6f4"> (Qin Dynasty)</text>
    <text x="20" y="590" fill="#cdd6f4">  Era:     221-206 BC</text>
    <text x="20" y="606" fill="#cdd6f4">  System:  Commandery-County with Three Lords Nine Ministers</text>
    <text x="20" y="622" fill="#cdd6f4">  Agents:  7</text>
    <text x="20" y="644" fill="#a6e3a1">✓ SOUL.md deployed</text>
    <text x="20" y="660" fill="#a6e3a1">✓ Active regime set to: china/qin</text>

  </g>
</svg>
